openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: shri
    description: Shri Academy AI Mentor operations
  - name: subscription
    description: Global GDP-tiered subscription (fiat + crypto)
  - name: blockchain
    description: SARA Token and general blockchain queries
  - name: abhaya
    description: Abhaya Gate thermodynamic safety analysis and telemetry
  - name: stripe
    description: Stripe direct subscription products, checkout and billing portal
  - name: mentor
    description: Mentor authentication, profile and metrics
  - name: secops
    description: Content Index analysis, Cyberdemon queue, and RageSage pipelines
  - name: scholarship
    description: Scholarship exams, questions, submissions and winner payouts
  - name: academic
    description: Core curriculum disciplines, courses, sitemaps, search, and student research profiles
  - name: forum
    description: Student community categories, threads, replies and voting
  - name: games
    description: Nemotron-powered gamified quizzes, riddles, matching, and coding challenges
  - name: mythology
    description: Cosmos Lore interactive mythology stories and episodes
  - name: privateStats
    description: Encrypted private system statistics and manifold telemetry
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /shri/chat:
    post:
      operationId: shriChat
      tags: [shri]
      summary: Chat with Shri AI Mentor
      description: Send a message to the Shri AI Mentor and receive a Socratic or supportive response based on Circuit A/B mode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShriChatInput"
      responses:
        "200":
          description: AI mentor response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShriMessage"
        "502":
          description: AI mentor backend unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShriError"
  /shri/state:
    get:
      operationId: getShriState
      tags: [shri]
      summary: Get current session state
      description: Returns the current circuit mode, frustration level, and streak for a session
      parameters:
        - in: query
          name: session_id
          schema:
            type: string
          required: false
          description: Session identifier (defaults to "default")
      responses:
        "200":
          description: Current session state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShriState"
  /shri/reset:
    post:
      operationId: resetShriSession
      tags: [shri]
      summary: Reset session state
      description: Clears frustration level, streak, and conversation history for a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ShriResetInput"
      responses:
        "200":
          description: Session successfully reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShriResetResponse"

  # ─── SUBSCRIPTION ───────────────────────────────────────────────────────────
  /subscription/plans:
    get:
      operationId: getSubscriptionPlans
      tags: [subscription]
      summary: Get GDP-tiered plans
      parameters:
        - in: query
          name: country_code
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Live subscription plans and live crypto rates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionPlansResponse"
  /subscription/checkout/fiat:
    post:
      operationId: checkoutFiat
      tags: [subscription]
      summary: Create Stripe checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutFiatInput"
      responses:
        "200":
          description: Checkout session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutFiatResponse"
  /subscription/checkout/crypto:
    post:
      operationId: checkoutCrypto
      tags: [subscription]
      summary: Create crypto payment record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutCryptoInput"
      responses:
        "200":
          description: Crypto payment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutCryptoResponse"
  /subscription/crypto/status/{id}:
    get:
      operationId: getCryptoPaymentStatus
      tags: [subscription]
      summary: Poll on-chain payment status
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Subscription crypto payment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CryptoPaymentStatusResponse"
  /subscription/status:
    get:
      operationId: getSubscriptionStatus
      tags: [subscription]
      summary: Unified subscription status
      parameters:
        - in: query
          name: email
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Subscription status of the student
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionStatusInfo"

  # ─── BLOCKCHAIN ─────────────────────────────────────────────────────────────
  /blockchain/token:
    get:
      operationId: getBlockchainTokenInfo
      tags: [blockchain]
      responses:
        "200":
          description: Token metadata and supply info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockchainTokenInfo"
  /blockchain/balance/{address}:
    get:
      operationId: getBlockchainBalance
      tags: [blockchain]
      parameters:
        - in: path
          name: address
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Balance of SARA tokens for given address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockchainBalanceInfo"
  /blockchain/votes/{address}:
    get:
      operationId: getBlockchainVotes
      tags: [blockchain]
      parameters:
        - in: path
          name: address
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Voting power for given address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockchainVotesInfo"
  /blockchain/holders:
    get:
      operationId: getBlockchainHolders
      tags: [blockchain]
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: Top token holders list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockchainHoldersList"
  /blockchain/transactions/{address}:
    get:
      operationId: getBlockchainTransactions
      tags: [blockchain]
      parameters:
        - in: path
          name: address
          schema:
            type: string
          required: true
        - in: query
          name: limit
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: Token transfer transaction history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockchainTransactionsList"
  /blockchain/abi:
    get:
      operationId: getBlockchainContractAbi
      tags: [blockchain]
      responses:
        "200":
          description: Verified SARA Token contract ABI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockchainContractAbiInfo"
  /blockchain/verification:
    get:
      operationId: getBlockchainVerificationStatus
      tags: [blockchain]
      responses:
        "200":
          description: Contract verification status on Etherscan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockchainVerificationStatusInfo"
  /blockchain/call:
    post:
      operationId: postBlockchainEthCall
      tags: [blockchain]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockchainEthCallInput"
      responses:
        "200":
          description: Result of the eth_call execution
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockchainEthCallResult"

  # ─── ABHAYA GATE ────────────────────────────────────────────────────────────
  /abhaya/analyze:
    post:
      operationId: analyzeAbhayaPayload
      tags: [abhaya]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AbhayaPayloadInput"
      responses:
        "200":
          description: Abhaya Gate analysis of generic payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbhayaAnalysisResult"
  /abhaya/analyze/text:
    post:
      operationId: analyzeAbhayaText
      tags: [abhaya]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AbhayaTextInput"
      responses:
        "200":
          description: Abhaya Gate analysis of text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbhayaAnalysisResult"
  /abhaya/stabilize:
    post:
      operationId: stabilizeAbhayaSignal
      tags: [abhaya]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AbhayaSignalInput"
      responses:
        "200":
          description: Phase-stabilised signal telemetry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbhayaStabilizeResult"
  /abhaya/status:
    get:
      operationId: getAbhayaStatus
      tags: [abhaya]
      responses:
        "200":
          description: Snapshot of manifold telemetry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbhayaStatusInfo"
  /abhaya/simulate:
    post:
      operationId: simulateAbhayaCycles
      tags: [abhaya]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AbhayaSimulateInput"
      responses:
        "200":
          description: Telemetry output from Maha-Pralaya simulation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AbhayaSimulateResult"

  # ─── STRIPE DIRECT ──────────────────────────────────────────────────────────
  /stripe/products:
    get:
      operationId: getStripeProducts
      tags: [stripe]
      responses:
        "200":
          description: List of active subscription products and their prices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeProductsList"
  /stripe/checkout:
    post:
      operationId: postStripeCheckout
      tags: [stripe]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripeCheckoutInput"
      responses:
        "200":
          description: Stripe checkout session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeCheckoutResponse"
  /stripe/portal:
    post:
      operationId: postStripePortal
      tags: [stripe]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StripePortalInput"
      responses:
        "200":
          description: Stripe billing portal session URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripePortalResponse"
  /stripe/status:
    get:
      operationId: getStripeStatus
      tags: [stripe]
