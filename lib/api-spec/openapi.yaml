        circuit_b: { type: number }
        circuit_b_active: { type: boolean }
        phase_cancelled: { type: boolean }
        damping_ratio: { type: number }
        gradient_variance: { type: number }
        free_energy: { type: number }
        cycles: { type: integer }
        timestamp: { type: string }
    AbhayaSignalInput:
      type: object
      required: [signal]
      properties:
