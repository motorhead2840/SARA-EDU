              schema:
                $ref: "#/components/schemas/ScholarshipExamsListInfo"
  /scholarship/exam:
    post:
      operationId: createScholarshipExam
      tags: [scholarship]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScholarshipExamCreateInput"
      responses:
        "200":
          description: Exam created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipExamSingleInfo"
  /scholarship/exam/{id}/question:
    post:
      operationId: addScholarshipQuestion
      tags: [scholarship]
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScholarshipQuestionAddInput"
      responses:
        "200":
          description: Question added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipQuestionSingleInfo"
  /scholarship/exam/{id}/questions/mentor:
    get:
      operationId: getScholarshipQuestionsMentor
      tags: [scholarship]
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Questions with solutions (mentor view)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipQuestionsMentorList"
  /scholarship/question/{qid}:
    delete:
      operationId: deleteScholarshipQuestion
      tags: [scholarship]
      parameters:
        - in: path
          name: qid
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Question deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipGenericSuccess"
  /scholarship/exam/{id}/status:
    put:
      operationId: updateScholarshipExamStatus
      tags: [scholarship]
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScholarshipExamStatusInput"
      responses:
        "200":
          description: Exam status updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipExamSingleInfo"
  /scholarship/exam/{id}/submissions:
    get:
      operationId: getScholarshipSubmissions
      tags: [scholarship]
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: List of student submissions for given exam
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipSubmissionsList"
  /scholarship/submission/{sid}/score:
    put:
      operationId: scoreScholarshipSubmission
      tags: [scholarship]
      parameters:
        - in: path
          name: sid
          schema:
            type: string
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScholarshipScoreInput"
      responses:
        "200":
          description: Submission scored successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipScoreResponse"
  /scholarship/exam/{id}/grant:
    post:
      operationId: grantScholarshipsForExam
      tags: [scholarship]
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Scholarships ranked, finalized, and granted to top-100
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipGrantResponse"

  # ─── ACADEMIC ───────────────────────────────────────────────────────────────
  /academic/disciplines:
    get:
      operationId: getAcademicDisciplines
      tags: [academic]
      responses:
        "200":
          description: List of academic disciplines
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicDisciplinesList"
  /academic/specializations:
    get:
      operationId: getAcademicSpecializations
      tags: [academic]
      parameters:
        - in: query
          name: discipline_id
          schema:
            type: string
          required: false
      responses:
        "200":
          description: List of specializations within given discipline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcademicSpecializationsList"
  /academic/courses:
    get:
      operationId: getAcademicCourses
      tags: [academic]
      parameters:
        - in: query
          name: discipline_id
          schema:
            type: string
          required: false
        - in: query
          name: specialization_id
          schema:
            type: string
          required: false
        - in: query
          name: level
          schema:
            type: string
          required: false
        - in: query
          name: search
          schema:
            type: string
          required: false
        - in: query
          name: limit
          schema:
            type: integer
          required: false
        - in: query
          name: offset
          schema:
            type: integer
          required: false
        - in: query
          name: ids
          schema:
            type: string
          required: false
        - in: query
          name: user_email
          schema:
            type: string
          required: false
      responses:
        "200":
          description: Search or query results of academic courses
          content:
            application/json:
              schema:
