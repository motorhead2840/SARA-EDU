    AbhayaSimulateInput:
      type: object
      properties:
        cycles: { type: integer }
        noise_level: { type: number }
    AbhayaSimulateResult:
      type: object
      required: [gate, simulation, params, summary, telemetry]
      properties:
        gate: { type: string }
