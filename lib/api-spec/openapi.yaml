      responses:
        "200":
          description: Direct Stripe subscription status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeStatusInfo"

  # ─── MENTOR AUTH ────────────────────────────────────────────────────────────
  /mentor/register:
    post:
      operationId: registerMentor
      tags: [mentor]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentorRegisterInput"
      responses:
        "201":
          description: Mentor account created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorAuthSuccess"
  /mentor/login:
    post:
      operationId: loginMentor
      tags: [mentor]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MentorLoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorAuthSuccess"
  /mentor/me:
    get:
      operationId: getMentorProfile
      tags: [mentor]
      responses:
        "200":
          description: Authenticated mentor profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorProfileInfo"
  /mentor/metrics:
    get:
      operationId: getMentorMetrics
      tags: [mentor]
      responses:
        "200":
          description: Unified metrics dashboard for scholarship school mentors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MentorMetricsInfo"

  # ─── SECOPS ─────────────────────────────────────────────────────────────────
  /secops/ingest:
    post:
      operationId: ingestSecopsContent
      tags: [secops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecopsIngestInput"
      responses:
        "200":
          description: Content ingested and risk scored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecopsIngestResult"
  /secops/flagged:
    get:
      operationId: listSecopsFlagged
      tags: [secops]
      parameters:
        - in: query
          name: tier
          schema:
            type: string
          required: false
        - in: query
          name: reviewed
          schema:
            type: boolean
          required: false
        - in: query
          name: limit
          schema:
            type: integer
          required: false
        - in: query
          name: offset
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: List of flagged content submissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecopsFlaggedList"
  /secops/label/{id}:
    post:
      operationId: labelSecopsContent
      tags: [secops]
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecopsLabelInput"
      responses:
        "200":
          description: Flagged item labeled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecopsGenericSuccess"
  /secops/pattern:
    post:
      operationId: addSecopsPattern
      tags: [secops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecopsPatternInput"
      responses:
        "200":
          description: Blocklist pattern added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecopsGenericSuccess"
  /secops/stats:
    get:
      operationId: getSecopsStats
      tags: [secops]
      responses:
        "200":
          description: Secops statistical aggregates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecopsStatsInfo"
  /secops/cyberdemon/queue:
    get:
      operationId: getSecopsCyberdemonQueue
      tags: [secops]
      responses:
        "200":
          description: Pending Cyberdemon events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecopsCyberdemonQueueInfo"
  /secops/cyberdemon/flush:
    post:
      operationId: flushSecopsCyberdemon
      tags: [secops]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SecopsCyberdemonFlushInput"
      responses:
        "200":
          description: Cyberdemon queue flushed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecopsGenericSuccess"
  /secops/ragethesage/export:
    post:
      operationId: exportSecopsRagethesage
      tags: [secops]
      responses:
        "200":
          description: Labelled content exported to S3
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecopsRagethesageExportResult"
  /secops/ragethesage/train:
    post:
      operationId: trainSecopsRagethesage
      tags: [secops]
      responses:
        "200":
          description: SageMaker RageSage training pipeline triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecopsRagethesageTrainResult"

  # ─── SCHOLARSHIP ────────────────────────────────────────────────────────────
  /scholarship/current:
    get:
      operationId: getScholarshipCurrentExam
      tags: [scholarship]
      responses:
        "200":
          description: Current open exam metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipCurrentExamInfo"
  /scholarship/exam/{id}/questions:
    get:
      operationId: getScholarshipExamQuestions
      tags: [scholarship]
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
      responses:
        "200":
          description: Questions for specific exam
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipQuestionsList"
  /scholarship/submit:
    post:
      operationId: submitScholarshipExam
      tags: [scholarship]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScholarshipSubmitInput"
      responses:
        "200":
          description: Exam answers submitted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScholarshipSubmitResponse"
  /scholarship/winners:
    get:
      operationId: getScholarshipWinners
      tags: [scholarship]
      parameters:
        - in: query
          name: exam_id
          schema:
            type: string
          required: false
      responses:
