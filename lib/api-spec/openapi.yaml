components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ShriChatInput:
      type: object
      required: [message]
      properties:
        message:
          type: string
          minLength: 1
          description: The student's message or question
        session_id:
          type: string
          description: Session identifier (defaults to "default")
    ShriMessage:
      type: object
      required: [response, circuit, frustration_level, correct_streak, session_id, context_used]
      properties:
        response:
          type: string
          description: The AI mentor's Socratic or supportive response
        circuit:
          type: string
          enum: [A, B]
          description: "Circuit A = Supportive mode (student struggling), Circuit B = Socratic/Rigorous mode"
        frustration_level:
          type: integer
          minimum: 0
          maximum: 5
          description: Current frustration score (0-5); triggers Circuit A at ≥2
        correct_streak:
          type: integer
          minimum: 0
          description: Consecutive non-frustrated responses
        session_id:
          type: string
        context_used:
          type: array
          items:
            type: string
          description: The syllabus chunks retrieved via RAG for this response
    ShriState:
      type: object
      required: [circuit, frustration_level, correct_streak, message_count, session_id]
      properties:
        circuit:
          type: string
          enum: [A, B]
        frustration_level:
          type: integer
          minimum: 0
        correct_streak:
          type: integer
          minimum: 0
        message_count:
          type: integer
          minimum: 0
        session_id:
          type: string
    ShriResetInput:
      type: object
      properties:
        session_id:
          type: string
          description: Session to reset (defaults to "default")
    ShriResetResponse:
      type: object
      required: [status, session_id]
      properties:
        status:
          type: string
        session_id:
          type: string
    ShriError:
      type: object
      required: [error]
      properties:
        error:
          type: string
    ScholarshipGenericSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ─── SUBSCRIPTION SCHEMAS ─────────────────────────────────────────────────
    SubscriptionPlansResponse:
      type: object
      required: [detected_country, tier, tier_label, usd_price, billing_period, features, fiat, crypto]
      properties:
        detected_country:
          type: string
        tier:
          type: string
        tier_label:
          type: string
        usd_price:
          type: number
        billing_period:
          type: string
        features:
          type: array
          items:
            type: string
        fiat:
          type: object
          properties:
            currency: { type: string }
            amount: { type: number }
            provider: { type: string }
        crypto:
          type: object
          properties:
            eth: { $ref: "#/components/schemas/CryptoAssetDetail" }
            usdc: { $ref: "#/components/schemas/CryptoAssetDetail" }
            btc: { $ref: "#/components/schemas/CryptoAssetDetail" }
            sara: { $ref: "#/components/schemas/CryptoAssetDetail" }
    CryptoAssetDetail:
      type: object
      properties:
        amount: { type: string }
        usd_rate: { type: number }
        wallet: { type: string }
        network: { type: string }
        decimals: { type: integer }
    CheckoutFiatInput:
      type: object
      required: [email]
      properties:
        email: { type: string }
        country_code: { type: string }
        payment_category: { type: string, enum: [card, bank] }
    CheckoutFiatResponse:
      type: object
      required: [url, tier, usd_price]
      properties:
        url: { type: string }
        tier: { type: string }
        usd_price: { type: number }
        payment_category: { type: string }
    CheckoutCryptoInput:
      type: object
      required: [email, currency]
      properties:
        email: { type: string }
        currency: { type: string, enum: [eth, usdc, btc, sara] }
        country_code: { type: string }
    CheckoutCryptoResponse:
      type: object
      required: [payment_id, currency, network, wallet_address, amount, usd_equivalent, tier, expires_at, instructions]
      properties:
        payment_id: { type: integer }
        currency: { type: string }
        network: { type: string }
        wallet_address: { type: string }
        amount: { type: string }
        usd_equivalent: { type: number }
        tier: { type: string }
        expires_at: { type: string }
        instructions: { type: string }
    CryptoPaymentStatusResponse:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [confirmed, expired, pending, error] }
        tx_hash: { type: string }
        error: { type: string }
        expires_in_ms: { type: number }
        payment: { type: object }
    SubscriptionStatusInfo:
      type: object
      properties:
        subscribed: { type: boolean }
        tier: { type: string }
        source: { type: string }
        expires_at: { type: string }

